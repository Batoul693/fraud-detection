{% extends "base.html" %}
{% block content %}

<h3 class="mb-4"> Single Transaction Detection</h3>

<form method="post" class="card p-4 shadow mb-4">
  <label class="mb-2">Select Model</label>
  <select name="model" class="form-select mb-3">
    <option>RandomForest</option>
    <option>XGBoost</option>
  </select>
  <button class="btn btn-primary">🎲 Get Random Sample</button>
</form>

{% if result %}
<div class="card p-4 shadow">
  <h5>
    Result:
    {% if result[0] == "Fraud" %}
      <span class="badge badge-fraud">FRAUD</span>
    {% else %}
      <span class="badge badge-safe">SAFE</span>
    {% endif %}
  </h5>
  <p class="mt-2">Probability: <b>{{ result[1] }}</b></p>
  <p>Transaction Hour: <b>{{ result[2] }}</b></p>
</div>
{% endif %}

{% endblock %}
