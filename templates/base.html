<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fraud Detection System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font (Professional Bank Style) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm custom-navbar">
    <div class="container-fluid px-4">

        <a class="navbar-brand fw-bold fs-4" href="/">
            💳 SecureBank AI
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item">
                    <a class="nav-link px-3" href="/">Single Prediction</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3" href="/batch">Batch Prediction</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3" href="/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3" href="/about">About</a>
                </li>
                <li class="nav-item ms-lg-3">
                    <a href="/logout" class="btn btn-danger btn-sm px-3">Logout</a>
                </li>
            </ul>
        </div>

    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container py-5">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
